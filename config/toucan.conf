# Toucan ZMK Configuration

# Enable ZMK Studio (real-time keymap editing)
CONFIG_ZMK_STUDIO=y

# Disable Studio locking (connect directly without unlock sequence)
CONFIG_ZMK_STUDIO_LOCKING=n

# Bluetooth
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Display
CONFIG_ZMK_DISPLAY=y

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
